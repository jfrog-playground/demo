name: Build npm Package

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'index.js'
      - '.github/workflows/npm-build.yml'
  workflow_dispatch:

env:
  JFROG_CLI_BUILD_NAME: npm-build
  JFROG_CLI_BUILD_NUMBER: ${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
        with:
          oidc-provider-name: jfrog-playground/demo@github

      - name: Configure npm
        run: jf npmc --repo-resolve=ghavt-npm-local --repo-deploy=ghavt-npm-local

      - name: Publish
        run: jf npm publish

      - name: Publish Build Info
        run: |
          jf rt bce
          jf rt bag
          jf rt bp
